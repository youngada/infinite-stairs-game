<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무한의 계단</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="pixel-frame">
    <div id="game-container">
      <canvas id="game-canvas" width="480" height="720"></canvas>
      <div id="gameover-overlay" class="hidden">
        <p>GAME OVER</p>
        <p id="gameover-score"></p>
        <button type="button" id="btn-restart">RESTART</button>
      </div>
      <div id="idle-overlay">
        <p>SPACE = 점프 / A = 방향전환</p>
        <p>클릭 또는 키로 시작</p>
      </div>
      <div id="buttons">
        <button type="button" id="btn-turn" aria-label="방향 전환 (A키만)">
          <span class="btn-key">A</span>
          <span class="btn-label">방향전환만</span>
        </button>
        <button type="button" id="btn-climb" aria-label="점프 (스페이스만)">
          <span class="btn-key">SPACE</span>
          <span class="btn-label">점프</span>
        </button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
